<script>

    function showModal() {
        $(document).ready(function(){
            $("#pageLoadModal").modal('show');
        });
    }
    function hideModal() {
        $(document).ready(function(){
            $("#pageLoadModal").modal('hide');
        });
    }
    function switch_div(show) {
        document.getElementById("show_"+show).style.display = "block";
        document.getElementById("show_"+((show==1)?2:1)).style.display = "none";
    }

    function myFunction() {
        var element = document.querySelector('.icon');
        element.classList.toggle("bark-mode");
    }
</script>
<script>
    document.querySelectorAll(
        'input[type=radio][name=foo]').forEach((elem) => {
        elem.addEventListener('click', allowUncheck);
        // only needed if elem can be pre-checked
        elem.previous = elem.checked;
    });

    function allowUncheck(e) {
        if (this.previous) {
            this.checked = false;
        }
        // need to update previous on all elements of this group
        // (either that or store the id of the checked element)
        document.querySelectorAll(
            `input[type=radio][name=${this.name}]`).forEach((elem) => {
            elem.previous = elem.checked;
        });
    }
</script>
<script>
    let selectEl = document.getElementById('select-list');

    selectEl.addEventListener('change', (e) => {

        } else {
            document.getElementById('txt-custom').style.display = 'none';
        }
    });
